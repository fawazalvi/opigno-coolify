dockerfile: Dockerfile

```
restart: "no"

environment:
  DB_HOST: ${DB_HOST}
  DB_PORT: ${DB_PORT:-5432}
  DB_NAME: ${DB_NAME}
  DB_USER: ${DB_USER}
  DB_PASS: ${DB_PASS}

  ADMIN_USER: ${ADMIN_USER:-admin}
  ADMIN_PASS: ${ADMIN_PASS}
  ADMIN_EMAIL: ${ADMIN_EMAIL}
  SITE_NAME: ${SITE_NAME:-Opigno LMS}

  OPIGNO_VERSION: ${OPIGNO_VERSION:-3.2.7}
  TRUSTED_HOST: ${TRUSTED_HOST:-lms.global-hrm.net}

volumes:
  - opigno_code_v11:/var/www/html
  - opigno_files_v11:/var/www/html/web/sites/default/files
  - opigno_private_v11:/var/www/html/private

expose:
  - "80"

networks:
  - coolify
  - opigno_network
